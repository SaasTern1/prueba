<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taars - Plataforma Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS GLOBALES --- */
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e293b;
            --bg-light: #f1f5f9;
            --text-dark: #334155;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: var(--bg-light); color: var(--text-dark); }

        /* --- SIDEBAR --- */
        .sidebar { background-color: var(--secondary-color); color: white; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; width: 100%; }
        .sidebar h1 { color: #60a5fa; font-weight: 800; letter-spacing: 1px; margin-bottom: 1rem; text-align: center; }
        .nav-btn { background: none; border: none; color: #cbd5e1; text-align: left; padding: 10px 15px; font-size: 1rem; font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background-color: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--primary-color); }

        /* --- CONTENIDO --- */
        .main-content { flex: 1; padding: 1.5rem; width: 100%; }
        .view-section { display: none; background-color: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 900px; margin: 0 auto; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h2 { margin-bottom: 1.5rem; color: var(--secondary-color); font-weight: 800; }

        @media (min-width: 768px) {
            body { flex-direction: row; }
            .sidebar { width: var(--sidebar-width); height: 100vh; position: sticky; top: 0; padding: 2rem; }
            .main-content { padding: 3rem; }
            .view-section { padding: 2.5rem; }
        }

        /* --- UI COMPONENTES --- */
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-dark); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; background-color: #f8fafc; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary-color); background-color: white; }
        textarea.live-notes { height: 200px; font-family: monospace; }
        
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 12px 24px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; }
        .btn-success { background-color: #10b981; }
        .btn-outline { background-color: transparent; border: 2px solid var(--primary-color); color: var(--primary-color); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; font-weight: 600; }
        
        .badge { background-color: #dbeafe; color: var(--primary-color); padding: 4px 10px; border-radius: 20px; font-size: 0.875rem; font-weight: 600; }
        .badge-pending { background-color: #fef08a; color: #854d0e; }
        .badge-done { background-color: #d1fae5; color: #065f46; }

        /* --- CARDS DE HISTORIAL --- */
        .class-card { border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .class-header { background-color: #f8fafc; padding: 15px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;}
        .class-body { padding: 15px; }
        .class-summary { background: #f1f5f9; padding: 10px; border-radius: 6px; font-size: 0.95rem; margin-bottom: 15px; border-left: 4px solid var(--primary-color);}
        .task-list { list-style: none; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: white; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 8px; flex-wrap: wrap; gap: 10px;}
        
        .recording-indicator { display: none; color: #ef4444; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h1>TAARS</h1>
        <button class="nav-btn active" id="btn-profesores">👨‍🏫 Profesores</button>
        <button class="nav-btn" id="btn-nueva-clase">➕ Nueva Clase</button>
        <button class="nav-btn" id="btn-historial">📚 Historial y Tareas</button>
    </nav>

    <main class="main-content">
        
        <section id="profesores" class="view-section active">
            <h2>Gestión de Profesores</h2>
            <div class="form-group" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <label>Nombre del Profesor</label>
                    <input type="text" id="nuevo-prof-nombre" placeholder="Ej. Prof. Luis Pérez">
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label>Categoría (Materia)</label>
                    <input type="text" id="nuevo-prof-categoria" placeholder="Ej. Ciencias">
                </div>
                <button class="btn btn-success" id="btn-guardar-profesor" style="width: auto; align-self: flex-end;">Guardar</button>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>Nombre</th><th>Categoría</th></tr></thead>
                    <tbody id="profesores-tbody"><tr><td colspan="2">Cargando...</td></tr></tbody>
                </table>
            </div>
        </section>

        <section id="nueva-clase" class="view-section">
            <h2>Crear Nueva Clase</h2>
            <div class="form-group">
                <label>Categoría (Materia)</label>
                <select id="select-categoria"><option value="">Selecciona un profesor primero...</option></select>
            </div>
            <div class="form-group">
                <label>Profesor Asignado</label>
                <input type="text" id="input-profesor" readonly placeholder="Automático...">
            </div>
            <div class="form-group">
                <label>Día de Clase</label>
                <input type="number" id="input-dia" value="1" min="1">
            </div>
            <button class="btn" id="btn-iniciar-clase">Iniciar Clase Ahora</button>
        </section>

        <section id="clase-activa" class="view-section">
            <h2 id="titulo-clase-activa">Clase en Curso</h2>
            <p id="info-clase-activa" style="margin-bottom: 25px; color: #64748b;"></p>
            
            <div class="form-group">
               <label>📝 Transcripción y Apuntes en vivo</label>
               <textarea id="notas-en-clase" class="live-notes" placeholder="Haz clic en 'Iniciar Micrófono' y habla..."></textarea>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center;">
                <button class="btn btn-outline" id="btn-microfono" style="width: auto;">🎙️ Iniciar Micrófono</button>
                <span class="recording-indicator" id="indicador-grabando">🔴 Escuchando...</span>
            </div>
            <button class="btn btn-danger" id="btn-finalizar-clase">Finalizar Clase y Revisar</button>
        </section>

        <section id="post-clase" class="view-section">
            <h2>Reporte Inteligente</h2>
            
            <div class="form-group" style="background: #e0f2fe; padding: 15px; border-radius: 8px; border: 1px solid #7dd3fc;">
                <label style="color: #0369a1;">🔑 Tu nueva API Key de Gemini</label>
                <input type="password" id="input-api-key" placeholder="Pega aquí tu clave...">
                <small style="color: #0369a1;">Se guardará de forma segura en tu navegador, no en GitHub.</small>
            </div>

            <div class="form-group">
                <label>Texto Capturado (Audio a Texto)</label>
                <textarea id="textarea-apuntes-capturados" rows="5" style="border: 2px solid var(--primary-color);"></textarea>
            </div>
            
            <button class="btn btn-outline" id="btn-procesar-ia" style="margin-bottom: 20px;">✨ Generar Resumen y Tareas</button>

            <div id="loading-gemini" style="display: none; text-align: center;"><div class="loader"></div></div>

            <div id="resultado-gemini" style="display: none;">
                <div class="form-group">
                    <label>Resumen de la Clase</label>
                    <textarea id="textarea-resumen-ia" rows="4" readonly></textarea>
                </div>
                <h3>Verifica las Tareas</h3>
                <div id="lista-validacion-ia" style="margin-bottom: 20px; margin-top: 10px;"></div>
                <button class="btn btn-success" id="btn-guardar-clase">Guardar Clase y Tareas en el Historial</button>
            </div>
        </section>

        <section id="historial" class="view-section">
            <h2>Historial de Clases y Control de Tareas</h2>
            <div id="contenedor-clases">
                <p style="text-align:center; color:#64748b; padding: 20px;">No hay clases registradas aún.</p>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAe0m1_geL_U9Q3a9QR2qiWLHUfxPh18DM",
            authDomain: "saas-7dab1.firebaseapp.com",
            projectId: "saas-7dab1",
            storageBucket: "saas-7dab1.firebasestorage.app",
            messagingSenderId: "917952183696",
            appId: "1:917952183696:web:06fbee0fbf259679d24715"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let profesoresArray = [];
        let reconocimientoVoz = null;
        let estaGrabando = false;

        // Recuperar API Key guardada en el navegador
        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_key');
            if(savedKey) document.getElementById('input-api-key').value = savedKey;
        };

        // --- NAVEGACIÓN ---
        function showTab(tabId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            if(tabId === 'profesores') document.getElementById('btn-profesores').classList.add('active');
            if(tabId === 'nueva-clase') document.getElementById('btn-nueva-clase').classList.add('active');
            if(tabId === 'historial') document.getElementById('btn-historial').classList.add('active');
        }

        document.getElementById('btn-profesores').addEventListener('click', () => showTab('profesores'));
        document.getElementById('btn-nueva-clase').addEventListener('click', () => showTab('nueva-clase'));
        document.getElementById('btn-historial').addEventListener('click', () => showTab('historial'));

        // --- PROFESORES ---
        onSnapshot(collection(db, "profesores"), (snapshot) => {
            profesoresArray = [];
            const tbody = document.getElementById('profesores-tbody');
            const selectCat = document.getElementById('select-categoria');
            tbody.innerHTML = ''; selectCat.innerHTML = '<option value="">Seleccionar...</option>';

            snapshot.forEach((doc) => {
                const data = doc.data();
                profesoresArray.push({ id: doc.id, ...data });
                tbody.innerHTML += `<tr><td><strong>${data.nombre}</strong></td><td><span class="badge">${data.categoria}</span></td></tr>`;
                selectCat.innerHTML += `<option value="${data.categoria}">${data.categoria}</option>`;
            });
            if(profesoresArray.length === 0) tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;">No hay profesores.</td></tr>';
        });

        document.getElementById('btn-guardar-profesor').addEventListener('click', async () => {
            const nombre = document.getElementById('nuevo-prof-nombre').value;
            const categoria = document.getElementById('nuevo-prof-categoria').value;
            if(!nombre || !categoria) return alert("Llena ambos campos.");
            await addDoc(collection(db, "profesores"), { nombre, categoria });
            document.getElementById('nuevo-prof-nombre').value = '';
            document.getElementById('nuevo-prof-categoria').value = '';
        });

        // --- NUEVA CLASE & MICRÓFONO ---
        document.getElementById('select-categoria').addEventListener('change', (e) => {
            const prof = profesoresArray.find(p => p.categoria === e.target.value);
            document.getElementById('input-profesor').value = prof ? prof.nombre : "Sin asignación";
        });

        document.getElementById('btn-iniciar-clase').addEventListener('click', () => {
            const cat = document.getElementById('select-categoria').value;
            if (!cat) return alert("Selecciona una materia primero.");
            document.getElementById('titulo-clase-activa').innerText = `Clase: ${cat}`;
            document.getElementById('info-clase-activa').innerText = `Profesor: ${document.getElementById('input-profesor').value} | Día: ${document.getElementById('input-dia').value}`;
            document.getElementById('notas-en-clase').value = ""; 
            showTab('clase-activa');
        });

        const btnMicrofono = document.getElementById('btn-microfono');
        if ('webkitSpeechRecognition' in window) {
            reconocimientoVoz = new webkitSpeechRecognition();
            reconocimientoVoz.continuous = true;
            reconocimientoVoz.interimResults = true;
            reconocimientoVoz.lang = 'es-ES';
            reconocimientoVoz.onresult = (e) => {
                let txt = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) txt += e.results[i][0].transcript + ' '; }
                if (txt) document.getElementById('notas-en-clase').value += txt;
            };
        }

        btnMicrofono.addEventListener('click', () => {
            if (!reconocimientoVoz) return;
            if (estaGrabando) { reconocimientoVoz.stop(); btnMicrofono.innerText = "🎙️ Iniciar Micrófono"; document.getElementById('indicador-grabando').style.display = "none"; } 
            else { reconocimientoVoz.start(); btnMicrofono.innerText = "⏹️ Detener Micrófono"; document.getElementById('indicador-grabando').style.display = "inline"; }
            estaGrabando = !estaGrabando;
        });

        document.getElementById('btn-finalizar-clase').addEventListener('click', () => {
            if (estaGrabando) btnMicrofono.click(); 
            document.getElementById('textarea-apuntes-capturados').value = document.getElementById('notas-en-clase').value;
            document.getElementById('resultado-gemini').style.display = 'none';
            document.getElementById('btn-procesar-ia').style.display = 'block';
            showTab('post-clase');
        });

        // --- GEMINI ---
        document.getElementById('btn-procesar-ia').addEventListener('click', async () => {
            const apiKey = document.getElementById('input-api-key').value.trim();
            if(!apiKey) return alert("Falta la API Key de Gemini.");
            localStorage.setItem('gemini_key', apiKey); // Guardar localmente
            
            const notas = document.getElementById('textarea-apuntes-capturados').value;
            document.getElementById('loading-gemini').style.display = 'block';
            document.getElementById('btn-procesar-ia').style.display = 'none';

            try {
                const prompt = `Analiza esta transcripción de clase. Genera dos partes separadas por "---SEPARADOR---":\n1. Un resumen breve.\n2. Una lista de tareas, cada una empezando con "TAREA: ".\nTranscripción: "${notas}"`;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                if (!data.candidates) throw new Error(data.error ? data.error.message : "Error de API");

                const partes = data.candidates[0].content.parts[0].text.split("---SEPARADOR---");
                document.getElementById('textarea-resumen-ia').value = partes[0] ? partes[0].trim() : "";
                
                const listaDiv = document.getElementById('lista-validacion-ia');
                listaDiv.innerHTML = '';
                if (partes[1]) {
                    partes[1].split('\n').forEach((linea, i) => {
                        if (linea.includes("TAREA:")) {
                            const desc = linea.replace(/TAREA:|[-*]/g, '').trim();
                            listaDiv.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:10px;"><input type="checkbox" id="t-${i}" checked> <label for="t-${i}">${desc}</label></div>`;
                        }
                    });
                }
                document.getElementById('resultado-gemini').style.display = 'block';
            } catch (err) {
                alert("Error: " + err.message);
                document.getElementById('btn-procesar-ia').style.display = 'block';
            } finally {
                document.getElementById('loading-gemini').style.display = 'none';
            }
        });

        // --- GUARDAR CLASE EN HISTORIAL ---
        document.getElementById('btn-guardar-clase').addEventListener('click', async () => {
            const tareasClase = [];
            document.querySelectorAll('#lista-validacion-ia div').forEach(div => {
                const checkbox = div.querySelector('input');
                if (checkbox && checkbox.checked) {
                    tareasClase.push({ desc: div.querySelector('label').innerText, estado: 'Pendiente' });
                }
            });

            const nuevaClase = {
                materia: document.getElementById('titulo-clase-activa').innerText.replace('Clase: ', ''),
                profesor: document.getElementById('input-profesor').value,
                dia: document.getElementById('input-dia').value,
                fecha: new Date().toLocaleDateString('es-ES'),
                resumen: document.getElementById('textarea-resumen-ia').value,
                tareas: tareasClase
            };

            try {
                await addDoc(collection(db, "clases"), nuevaClase);
                alert("Clase guardada en el historial.");
                showTab('historial');
            } catch (e) { alert("Error al guardar en Firebase: " + e.message); }
        });

        // --- CARGAR Y RENDERIZAR HISTORIAL DE CLASES ---
        onSnapshot(collection(db, "clases"), (snapshot) => {
            const contenedor = document.getElementById('contenedor-clases');
            contenedor.innerHTML = '';
            
            if(snapshot.empty) {
                contenedor.innerHTML = '<p style="text-align:center; color:#64748b; padding: 20px;">No hay clases registradas aún.</p>';
                return;
            }

            snapshot.forEach((docSnap) => {
                const claseId = docSnap.id;
                const clase = docSnap.data();
                
                let tareasHTML = '';
                if(clase.tareas && clase.tareas.length > 0) {
                    clase.tareas.forEach((t, index) => {
                        const esCompletada = t.estado === 'Completada';
                        tareasHTML += `
                            <li class="task-item">
                                <span style="flex:1; ${esCompletada ? 'text-decoration: line-through; color: #94a3b8;' : ''}">${t.desc}</span>
                                <span class="badge ${esCompletada ? 'badge-done' : 'badge-pending'}">${t.estado}</span>
                                <button onclick="cambiarEstadoTarea('${claseId}', ${index}, '${t.estado}')" class="btn ${esCompletada ? 'btn-outline' : 'btn-success'}" style="width:auto; margin:0; padding: 6px 12px; font-size: 0.85rem;">
                                    ${esCompletada ? 'Deshacer' : '✔ Completar'}
                                </button>
                            </li>
                        `;
                    });
                } else {
                    tareasHTML = '<p style="color:#64748b; font-size:0.9rem;">No hubo tareas asignadas.</p>';
                }

                contenedor.innerHTML += `
                    <div class="class-card">
                        <div class="class-header">
                            <div>
                                <h3 style="color: var(--secondary-color); margin-bottom: 5px;">${clase.materia} (Día ${clase.dia})</h3>
                                <small style="color: #64748b;">👨‍🏫 ${clase.profesor} | 📅 ${clase.fecha}</small>
                            </div>
                        </div>
                        <div class="class-body">
                            <div class="class-summary"><strong>Resumen:</strong> ${clase.resumen}</div>
                            <h4 style="margin-bottom: 10px; color: var(--secondary-color);">Control de Tareas:</h4>
                            <ul class="task-list">${tareasHTML}</ul>
                        </div>
                    </div>
                `;
            });
        });

        // Hacer global la función para cambiar el estado de la tarea en Firebase
        window.cambiarEstadoTarea = async (claseId, tareaIndex, estadoActual) => {
            // Obtener la clase actual desde Firebase
            const claseDoc = await getDocs(collection(db, "clases"));
            let claseData = null;
            claseDoc.forEach(d => { if(d.id === claseId) claseData = d.data(); });
            
            if(claseData) {
                // Modificar el estado de esa tarea específica
                const nuevoEstado = estadoActual === 'Pendiente' ? 'Completada' : 'Pendiente';
                claseData.tareas[tareaIndex].estado = nuevoEstado;
                
                // Actualizar en Firebase
                await updateDoc(doc(db, "clases", claseId), { tareas: claseData.tareas });
            }
        };

    </script>
</body>
</html>
