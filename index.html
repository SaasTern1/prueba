<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taars - Plataforma Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS GLOBALES Y RESPONSIVOS --- */
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e293b;
            --bg-light: #f1f5f9;
            --text-dark: #334155;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: var(--bg-light); color: var(--text-dark); }

        /* --- SIDEBAR --- */
        .sidebar { background-color: var(--secondary-color); color: white; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; width: 100%; }
        .sidebar h1 { color: #60a5fa; font-weight: 800; letter-spacing: 1px; margin-bottom: 1rem; text-align: center; }
        .nav-btn { background: none; border: none; color: #cbd5e1; text-align: left; padding: 10px 15px; font-size: 1rem; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.2s ease-in-out; }
        .nav-btn:hover, .nav-btn.active { background-color: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--primary-color); }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content { flex: 1; padding: 1.5rem; width: 100%; }
        .view-section { display: none; background-color: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); max-width: 900px; margin: 0 auto; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h2 { margin-bottom: 1.5rem; color: var(--secondary-color); font-weight: 800; }

        @media (min-width: 768px) {
            body { flex-direction: row; }
            .sidebar { width: var(--sidebar-width); height: 100vh; position: sticky; top: 0; padding: 2rem; }
            .sidebar h1 { text-align: left; margin-bottom: 2rem; font-size: 1.5rem; }
            .main-content { padding: 3rem; }
            .view-section { padding: 2.5rem; }
        }

        /* --- UI COMPONENTES --- */
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-dark); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; background-color: #f8fafc; }
        textarea.live-notes { height: 200px; font-family: monospace; }
        
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 12px 24px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; transition: background-color 0.2s; margin-top: 10px; }
        .btn:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #ef4444; }
        .btn-success { background-color: #10b981; }
        .btn-outline { background-color: transparent; border: 2px solid var(--primary-color); color: var(--primary-color); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; font-weight: 600; }
        .badge { background-color: #dbeafe; color: var(--primary-color); padding: 4px 10px; border-radius: 20px; font-size: 0.875rem; font-weight: 600; }

        .flex-row { display: flex; gap: 10px; align-items: flex-end; }
        .recording-indicator { display: none; color: #ef4444; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h1>TAARS</h1>
        <button class="nav-btn active" id="btn-profesores">👨‍🏫 Profesores</button>
        <button class="nav-btn" id="btn-nueva-clase">➕ Nueva Clase</button>
        <button class="nav-btn" id="btn-tareas">✅ Tareas</button>
    </nav>

    <main class="main-content">
        
        <section id="profesores" class="view-section active">
            <h2>Gestión de Profesores</h2>
            
            <div class="form-group flex-row">
                <div style="flex: 1;">
                    <label>Nombre del Profesor</label>
                    <input type="text" id="nuevo-prof-nombre" placeholder="Ej. Prof. Luis Pérez">
                </div>
                <div style="flex: 1;">
                    <label>Categoría (Materia)</label>
                    <input type="text" id="nuevo-prof-categoria" placeholder="Ej. Ciencias">
                </div>
                <button class="btn btn-success" id="btn-guardar-profesor" style="width: auto;">Guardar</button>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>Nombre</th><th>Categoría</th></tr></thead>
                    <tbody id="profesores-tbody">
                        <tr><td colspan="2">Cargando profesores...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="nueva-clase" class="view-section">
            <h2>Crear Nueva Clase</h2>
            <div class="form-group">
                <label>Categoría (Materia)</label>
                <select id="select-categoria">
                    <option value="">Selecciona un profesor primero...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Profesor Asignado</label>
                <input type="text" id="input-profesor" readonly placeholder="Automático...">
            </div>
            <div class="form-group">
                <label>Día de Clase</label>
                <input type="number" id="input-dia" value="1" min="1">
            </div>
            <button class="btn" id="btn-iniciar-clase">Iniciar Clase Ahora</button>
        </section>

        <section id="clase-activa" class="view-section">
            <h2 id="titulo-clase-activa">Clase en Curso</h2>
            
            <div class="form-group">
               <label for="notas-en-clase">📝 Transcripción y Apuntes en vivo</label>
               <textarea id="notas-en-clase" class="live-notes" placeholder="Haz clic en 'Iniciar Micrófono' y habla. El sistema transcribirá aquí..."></textarea>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn btn-outline" id="btn-microfono" style="width: auto;">🎙️ Iniciar Micrófono</button>
                <span class="recording-indicator" id="indicador-grabando">🔴 Escuchando...</span>
            </div>

            <button class="btn btn-danger" id="btn-finalizar-clase">Finalizar Clase y Generar Reporte IA</button>
        </section>

        <section id="post-clase" class="view-section">
            <h2>Reporte Inteligente con Gemini</h2>
            <div id="loading-gemini" style="display: none; text-align: center;">
                <p>Procesando con Gemini...</p>
            </div>
            <div id="resultado-gemini" style="display: none;">
                <div class="form-group">
                    <label>Resumen de la Clase</label>
                    <textarea id="textarea-resumen-ia" rows="4" readonly></textarea>
                </div>
                <h3>Verifica las Tareas Detectadas</h3>
                <div id="lista-validacion-ia" style="margin-bottom: 20px;"></div>
                <button class="btn btn-success" id="btn-guardar-tareas">Confirmar y Guardar Tareas</button>
            </div>
        </section>

        <section id="tareas" class="view-section">
            <h2>Tablero de Tareas</h2>
            <table>
                <thead><tr><th>Descripción</th><th>Estado</th></tr></thead>
                <tbody id="tareas-tbody">
                    <tr><td colspan="2">No hay tareas.</td></tr>
                </tbody>
            </table>
        </section>

    </main>

    <script type="module">
        // 1. IMPORTACIONES DE FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. CONFIGURACIÓN FIREBASE Y GEMINI
        const firebaseConfig = {
            apiKey: "AIzaSyAe0m1_geL_U9Q3a9QR2qiWLHUfxPh18DM",
            authDomain: "saas-7dab1.firebaseapp.com",
            projectId: "saas-7dab1",
            storageBucket: "saas-7dab1.firebasestorage.app",
            messagingSenderId: "917952183696",
            appId: "1:917952183696:web:06fbee0fbf259679d24715"
        };
        const GEMINI_API_KEY = "AIzaSyChkb0ATuGQPpIVavC1jR92l8DqQS2ae-s";

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Variables Globales
        let profesoresArray = [];
        let tareasOficiales = [];
        let reconocimientoVoz = null;
        let estaGrabando = false;

        // --- SISTEMA DE NAVEGACIÓN ---
        function showTab(tabId) {
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            if(tabId === 'profesores') document.getElementById('btn-profesores').classList.add('active');
            if(tabId === 'nueva-clase') document.getElementById('btn-nueva-clase').classList.add('active');
            if(tabId === 'tareas') document.getElementById('btn-tareas').classList.add('active');
        }

        document.getElementById('btn-profesores').addEventListener('click', () => showTab('profesores'));
        document.getElementById('btn-nueva-clase').addEventListener('click', () => showTab('nueva-clase'));
        document.getElementById('btn-tareas').addEventListener('click', () => showTab('tareas'));

        // --- GESTIÓN DE PROFESORES (FIREBASE FIRESTORE) ---
        // Escuchar cambios en la base de datos en tiempo real
        onSnapshot(collection(db, "profesores"), (snapshot) => {
            profesoresArray = [];
            const tbody = document.getElementById('profesores-tbody');
            const selectCat = document.getElementById('select-categoria');
            
            tbody.innerHTML = '';
            selectCat.innerHTML = '<option value="">Seleccionar...</option>';

            snapshot.forEach((doc) => {
                const data = doc.data();
                profesoresArray.push({ id: doc.id, ...data });
                
                // Llenar tabla
                tbody.innerHTML += `<tr><td><strong>${data.nombre}</strong></td><td><span class="badge">${data.categoria}</span></td></tr>`;
                
                // Llenar select de nueva clase
                selectCat.innerHTML += `<option value="${data.categoria}">${data.categoria}</option>`;
            });

            if(profesoresArray.length === 0) tbody.innerHTML = '<tr><td colspan="2">No hay profesores creados.</td></tr>';
        });

        // Guardar nuevo profesor
        document.getElementById('btn-guardar-profesor').addEventListener('click', async () => {
            const nombre = document.getElementById('nuevo-prof-nombre').value;
            const categoria = document.getElementById('nuevo-prof-categoria').value;
            
            if(!nombre || !categoria) return alert("Llena ambos campos.");

            try {
                await addDoc(collection(db, "profesores"), { nombre, categoria });
                document.getElementById('nuevo-prof-nombre').value = '';
                document.getElementById('nuevo-prof-categoria').value = '';
            } catch (e) {
                console.error("Error añadiendo documento: ", e);
                alert("Error al guardar en Firebase. Revisa las reglas de seguridad de Firestore.");
            }
        });

        // --- NUEVA CLASE ---
        document.getElementById('select-categoria').addEventListener('change', (e) => {
            const prof = profesoresArray.find(p => p.categoria === e.target.value);
            document.getElementById('input-profesor').value = prof ? prof.nombre : "";
        });

        document.getElementById('btn-iniciar-clase').addEventListener('click', () => {
            const cat = document.getElementById('select-categoria').value;
            if (!cat) return alert("Selecciona una materia.");
            document.getElementById('titulo-clase-activa').innerText = `Clase: ${cat}`;
            document.getElementById('notas-en-clase').value = ""; 
            showTab('clase-activa');
        });

        // --- TRANSCRIPCIÓN DE VOZ (SPEECH-TO-TEXT) ---
        const btnMicrofono = document.getElementById('btn-microfono');
        const indicador = document.getElementById('indicador-grabando');
        const textAreaNotas = document.getElementById('notas-en-clase');

        if ('webkitSpeechRecognition' in window) {
            reconocimientoVoz = new webkitSpeechRecognition();
            reconocimientoVoz.continuous = true;
            reconocimientoVoz.interimResults = true;
            reconocimientoVoz.lang = 'es-ES'; // Ajustar según necesidad

            reconocimientoVoz.onresult = (event) => {
                let transcripcionFinal = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        transcripcionFinal += event.results[i][0].transcript + ' ';
                    }
                }
                if (transcripcionFinal) {
                    textAreaNotas.value += transcripcionFinal;
                }
            };

            reconocimientoVoz.onerror = (event) => console.error("Error de voz:", event.error);
        } else {
            btnMicrofono.innerText = "❌ Navegador no soporta dictado";
            btnMicrofono.disabled = true;
        }

        btnMicrofono.addEventListener('click', () => {
            if (!reconocimientoVoz) return;
            
            if (estaGrabando) {
                reconocimientoVoz.stop();
                btnMicrofono.innerText = "🎙️ Iniciar Micrófono";
                indicador.style.display = "none";
            } else {
                reconocimientoVoz.start();
                btnMicrofono.innerText = "⏹️ Detener Micrófono";
                indicador.style.display = "inline";
            }
            estaGrabando = !estaGrabando;
        });

        // --- GEMINI API INTEGRACIÓN ---
        document.getElementById('btn-finalizar-clase').addEventListener('click', async () => {
            if (estaGrabando) btnMicrofono.click(); // Apagar micro si está encendido
            
            const notas = textAreaNotas.value;
            if (notas.trim().length < 5) return alert("No hay texto suficiente para analizar.");

            showTab('post-clase');
            document.getElementById('loading-gemini').style.display = 'block';
            document.getElementById('resultado-gemini').style.display = 'none';

            try {
                const prompt = `Analiza esta transcripción de clase. Genera dos partes separadas por "---SEPARADOR---":
1. Un resumen breve.
2. Una lista de tareas, cada una empezando con "TAREA: ".
Transcripción: "${notas}"`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const textoIA = data.candidates[0].content.parts[0].text;
                
                const partes = textoIA.split("---SEPARADOR---");
                document.getElementById('textarea-resumen-ia').value = partes[0] ? partes[0].trim() : "";
                
                const listaDiv = document.getElementById('lista-validacion-ia');
                listaDiv.innerHTML = '';
                
                if (partes[1]) {
                    partes[1].split('\n').forEach((linea, i) => {
                        if (linea.includes("TAREA:")) {
                            const desc = linea.replace(/TAREA:|[-*]/g, '').trim();
                            listaDiv.innerHTML += `<div><input type="checkbox" id="t-${i}" checked> <label for="t-${i}">${desc}</label></div>`;
                        }
                    });
                }
                document.getElementById('resultado-gemini').style.display = 'block';
            } catch (err) {
                alert("Error con Gemini: " + err.message);
            } finally {
                document.getElementById('loading-gemini').style.display = 'none';
            }
        });

        // --- GUARDAR TAREAS ---
        document.getElementById('btn-guardar-tareas').addEventListener('click', () => {
            document.querySelectorAll('#lista-validacion-ia div').forEach(div => {
                const checkbox = div.querySelector('input');
                const label = div.querySelector('label');
                if (checkbox && checkbox.checked) {
                    tareasOficiales.push(label.innerText);
                }
            });
            
            const tbody = document.getElementById('tareas-tbody');
            tbody.innerHTML = '';
            tareasOficiales.forEach(t => {
                tbody.innerHTML += `<tr><td>${t}</td><td><span class="badge">Pendiente</span></td></tr>`;
            });
            
            showTab('tareas');
        });

    </script>
</body>
</html>
